<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Event Gallery</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#f4f7fc;
}

/* Header */

.gallery-header{
    background:linear-gradient(135deg,#2563eb,#7c3aed);
    color:white;
    text-align:center;
    padding:80px 20px;
}

.gallery-header h1{
    font-size:3rem;
    font-weight:700;
}

/* Gallery */

.gallery-section{
    padding:60px 0;
}

.gallery-card{
    border:none;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 10px 25px rgba(0,0,0,0.1);
    transition:0.4s;
}

.gallery-card:hover{
    transform:translateY(-10px);
}

.gallery-card img{
    height:250px;
    object-fit:cover;
}

/* Footer */

footer{
    background:#0f172a;
    color:white;
    text-align:center;
    padding:20px;
    margin-top:40px;
}

</style>
</head>
<body>

<!-- Header -->

<section class="gallery-header">
    <h1>Event Gallery</h1>
    <p>Memories from our college events</p>
</section>

<!-- Gallery Grid -->

<section class="gallery-section">
<div class="container">

<div class="row g-4">

<!-- Image 1 -->
<div class="col-lg-4 col-md-6">
    <div class="card gallery-card">
        <img src="https://images.unsplash.com/photo-1516321318423-f06f85e504b3?w=800"
             class="card-img-top img-fluid"
             alt="Technical Event">
        <div class="card-body text-center">
            <h5>Technical Quiz</h5>
        </div>
    </div>
</div>

<!-- Image 2 -->
<div class="col-lg-4 col-md-6">
    <div class="card gallery-card">
        <img src="https://images.unsplash.com/photo-1515879218367-8466d910aaa4?w=800"
             class="card-img-top img-fluid"
             alt="Hackathon">
        <div class="card-body text-center">
            <h5>Hackathon</h5>
        </div>
    </div>
</div>

<!-- Image 3 -->
<div class="col-lg-4 col-md-6">
    <div class="card gallery-card">
        <img src="https://images.unsplash.com/photo-1522202176988-66273c2fd55f?w=800"
             class="card-img-top img-fluid"
             alt="Poster Presentation">
        <div class="card-body text-center">
            <h5>Poster Presentation</h5>
        </div>
    </div>
</div>

<!-- Image 4 -->
<div class="col-lg-4 col-md-6">
    <div class="card gallery-card">
        <img src="https://images.unsplash.com/photo-1517694712202-14dd9538aa97?w=800"
             class="card-img-top img-fluid"
             alt="Coding Contest">
        <div class="card-body text-center">
            <h5>Coding Contest</h5>
        </div>
    </div>
</div>

<!-- Image 5 -->
<div class="col-lg-4 col-md-6">
    <div class="card gallery-card">
        <img src="https://images.unsplash.com/photo-1498050108023-c5249f4df085?w=800"
             class="card-img-top img-fluid"
             alt="Project Expo">
        <div class="card-body text-center">
            <h5>Project Expo</h5>
        </div>
    </div>
</div>

<!-- Image 6 -->
<div class="col-lg-4 col-md-6">
    <div class="card gallery-card">
        <img src="https://images.unsplash.com/photo-1501386761578-eac5c94b800a?w=800"
             class="card-img-top img-fluid"
             alt="Cultural Fest">
        <div class="card-body text-center">
            <h5>Cultural Fest</h5>
        </div>
    </div>
</div>

</div>

</div>
</section>

<footer>
    © 2026 EventSphere | College Event Management System
</footer>

</body>
</html>
