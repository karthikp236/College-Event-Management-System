<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Event Registration</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:linear-gradient(135deg,#2563eb,#7c3aed);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

/* Form Box */
.container-box{
    background:white;
    width:100%;
    max-width:650px;
    padding:40px;
    border-radius:20px;
    box-shadow:0 15px 40px rgba(0,0,0,0.2);
}

h2{
    text-align:center;
    margin-bottom:25px;
    font-weight:700;
    color:#0f172a;
}

/* Inputs */
.form-control,
.form-select{
    height:50px;
    border-radius:10px;
}

.form-control:focus,
.form-select:focus{
    box-shadow:none;
    border-color:#2563eb;
}

/* Button */
.btn-submit{
    width:100%;
    height:50px;
    border:none;
    border-radius:30px;
    background:linear-gradient(135deg,#2563eb,#7c3aed);
    color:white;
    font-weight:600;
    cursor:pointer;
}

.btn-submit:hover{
    opacity:0.9;
}

</style>
</head>

<body>

<div class="container-box">

<h2>Event Registration Form</h2>

<!-- No JS: form redirects to success page -->
<form action="success.html">

<!-- Student Name -->
<div class="mb-3">
<label class="form-label">Student Name</label>
<input type="text" class="form-control" required>
</div>

<!-- Roll Number -->
<div class="mb-3">
<label class="form-label">Roll Number</label>
<input type="text" class="form-control" required>
</div>

<!-- Branch -->
<div class="mb-3">
<label class="form-label">Branch</label>
<select class="form-select" required>
<option value="">Select Branch</option>
<option>CSE</option>
<option>ECE</option>
<option>EEE</option>
<option>IT</option>
<option>Mechanical</option>
<option>Civil</option>
</select>
</div>

<!-- Email -->
<div class="mb-3">
<label class="form-label">Email</label>
<input type="email" class="form-control" required>
</div>

<!-- Mobile -->
<div class="mb-3">
<label class="form-label">Mobile Number</label>
<input type="tel" class="form-control" required>
</div>

<!-- Event Selection -->
<div class="mb-4">
<label class="form-label">Event Selection</label>
<select class="form-select" required>
<option value="">Choose Event</option>
<option>Technical Quiz</option>
<option>Hackathon</option>
<option>Poster Presentation</option>
<option>Coding Contest</option>
<option>Project Expo</option>
<option>Cultural Fest</option>
</select>
</div>

<!-- Submit -->
<button type="submit" class="btn-submit">
Register
</button>

</form>

</div>

</body>
</html>
